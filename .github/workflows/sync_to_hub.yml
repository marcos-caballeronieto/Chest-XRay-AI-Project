name: Sync Frontend to Hugging Face Space

on:
  push:
    branches: [main]
    # IMPORTANT: Only trigger this action if files in the frontend folder change
    paths:
      - 'frontend/**' 
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Clone the Space
          git clone https://marcoscaballero27:$HF_TOKEN@huggingface.co/spaces/marcoscaballero27/pneumonia-triage-ui hf-space
          
          # 2. Sync the contents, but EXCLUDE critical Hugging Face files from being deleted
          rsync -av --delete --exclude='.git' --exclude='README.md' --exclude='.gitattributes' --exclude='Dockerfile' ./frontend/ ./hf-space/
          
          # 3. Commit and push
          cd hf-space
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          
          if git diff-index --quiet HEAD --; then
            echo "No changes to sync."
          else
            git commit -m "Sync frontend from GitHub monorepo"
            # 4. Explicitly include the token in the push command to fix the auth error
            git push https://marcoscaballero27:$HF_TOKEN@huggingface.co/spaces/marcoscaballero27/pneumonia-triage-ui main
          fi